<header class="site-header">
  <a class="brand" routerLink="/">
    <span class="brand-mark">NV</span>
    <span>Novo Shop</span>
  </a>

  <nav class="main-nav" aria-label="Navegacao principal">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Produtos</a>
    <a routerLink="/login" routerLinkActive="active" *ngIf="!auth.isLoggedIn()">Login</a>
    <a routerLink="/perfil" routerLinkActive="active" *ngIf="auth.isLoggedIn()">Minha conta</a>
    <button class="link-button" type="button" *ngIf="auth.isLoggedIn()" (click)="logout()">Sair</button>
  </nav>
</header>

<main>
  <router-outlet />
</main>

<footer class="site-footer">
  <strong>Novo Shop</strong>
  <span>Produtos e autenticacao consumindo Fake Store API.</span>
</footer>
